<!DOCTYPE html>
<html>
<head>
    <title>Translator App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🌐 Language Translator</h1>

    <textarea id="inputText" placeholder="Enter text here..."></textarea>

    <select id="language">
        <option value="ta">Tamil</option>
        <option value="hi">Hindi</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
    </select>

    <button onclick="translateText()">Translate</button>

    <h3>Translated Text:</h3>
    <p id="outputText"></p>
</div>

<script>
function translateText() {
    let text = document.getElementById("inputText").value;
    let dest = document.getElementById("language").value;

    if (!text) {
        alert("Enter some text!");
        return;
    }

    fetch('/translate', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: `text=${encodeURIComponent(text)}&dest=${dest}`
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            document.getElementById("outputText").innerText = data.translated_text;
        } else {
            document.getElementById("outputText").innerText = "Error: " + data.error;
        }
    });
}
</script>

</body>
</html>
